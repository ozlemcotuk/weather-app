<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hava Durumu Uygualaması</title>

    <!-- ! Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- ! External CSS -->
     <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1 class="fw-bold text-danger text-center pt-5">Bu proje Özlem Çotuk  tarafından oluşturuldu.</h1>

    <form>
        <h3 class="text-secondary fw-bold text-center pt-3">5 Günlük Hava Durumu</h3>
        <div class="container text-center pb-2 d-flex align-items-center w-50 gap-2">
            <input id="searchInput" type="text" class="form-control shadow-none" placeholder="Şehir giriniz...">
            <button id="searchBtn" class="btn btn-outline-secondary" type="submit">Ara</button>
        </div>
    </form>

    <!-- ! Hava durumu verilerinin geleceği alanı tasarlayalım -->
    <div id="content" class="container text-center fw-bold fs-3 shadow-lg rounded-5 pt-3">
        <div class="row d-flex justify-content-center mt-2">
            <!-- <div class="col-4">
                <div class="card">
                    <img src="..." class="card-img-top" alt="...">
                    <div class="card-body">
                        <h5 class="card-title">Çanakkale,TR</h5>
                        <p class="card-text">01 Aralık 2025,Pazartesi</p>
                        <p class="card-text">25 °C</p>
                        <p>Yağışlı</p>
                    </div>
                </div>
            </div> -->
        </div>
    </div>


    <!-- ! Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- ! Vantajs-1 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <!-- ! Vantajs-2 -->
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.clouds.min.js"></script>

    <script>
        VANTA.CLOUDS({
        el: "body",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.00,
        minWidth: 200.00,
        skyColor: 0xc368d7,
        cloudColor: 0xadded5,
        sunColor: 0xfff118
        })
    </script>

    <!-- ! External JS -->
    <script src="script.js"></script>
</body>
</html>
